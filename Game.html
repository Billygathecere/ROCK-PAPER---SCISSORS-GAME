<!DOCTYPE html>
<html lang="en">

<head>

    <!-- CSS link -->
    <link rel="stylesheet" href="Game.css">

    <!-- Fontawesome link -->
    <script src="https://kit.fontawesome.com/1d68a8fcd4.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>

<body>
    <div class="game-card">
        <div class="nav">

            <a href="Rules.html"><i class="fa-solid fa-arrow-left"></i></a>
        </div>
        <div class="choices">
            <span>CHOICES</span>
            <button type="button" class="Rock" onclick="game(event)">
                Rock
            </button>
            <button type="button" class="Paper" onclick="game(event)">
                Paper
            </button>
            <button type="button" class="Scissors" onclick="game(event)">
                Scissors
            </button>
        </div>
        <!-- Display section -->
        <div class="results-section">
            <!-- Player Results -->
            <div class="player">
                <h3>YOU</h3>
                <div class="results" id="player-results"></div>
                <div class="pscores" id="pscores"></div>
            </div>
            <div class="versus">
                <span class="v">VS</span>
            </div>
            <div class="final-results" id="final-results">
                <p id="results-comment">
                </p>
            </div>
            <!-- Computer Results -->
            <div class="computer">
                <h3>COMPUTER</h3>
                <div class="c-results" id="computer-results"></div>
                <div class="cscores" id="cscores"></div>
            </div>
        </div>
        <div class="buttons">
            <button type="button" class="reset" onclick="reset()">
                Reset
            </button>
            <button type="button" class="home" onclick="home()">
                Home
            </button>
            <button type="button" class="rules" onclick="rules()">
                Rules
            </button>
            <button type="button" class="High-score" onclick="High_score()">
                High-score
            </button>
            <div class="high-score">
                <p id="pHighscore"></p>
                <p id="cHighscore"></p>
            </div>
        </div>
    </div>
    <script src="Script.js"></script>
</body>

</html>
