<!DOCTYPE html>
<html lang="en">
<head>

    <!-- CSS link -->
     <link rel="stylesheet" href="Game.css">

     <!-- Fontawesome link -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>

<body>
    <div class="game-card">
        <div class="nav">
            
            <a href="Rules.html"><i class="fa-solid fa-arrow-left"></i></a>
        </div>
        <div class="choices">
            <span>CHOICES</span>
            <button type="button" onclick="game()">

            </button>
            <button type="button" onclick="game()">
                Paper
            </button>
            <button type="button" onclick="game()">

            </button>
